name: safarsuite-staging

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      CONTROL_CLOUD_HOST: ${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}
      CONTROL_DESK_HOST: ${CONTROL_DESK_HOST:?CONTROL_DESK_HOST is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - control-cloud-api
      - control-desk-ui

  control-cloud-api:
    build:
      context: ../..
      dockerfile: src/SafarSuite.ControlCloud.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Persistence__Provider: Postgres
      ConnectionStrings__ControlCloud: Host=control-cloud-db;Port=5432;Database=${CONTROL_CLOUD_DB_NAME:?CONTROL_CLOUD_DB_NAME is required};Username=${CONTROL_CLOUD_DB_USER:?CONTROL_CLOUD_DB_USER is required};Password=${CONTROL_CLOUD_DB_PASSWORD:?CONTROL_CLOUD_DB_PASSWORD is required}
      ControlCloud__BootstrapPackages__CloudBaseUrl: https://${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}
      ControlCloud__Receiver__SigningKeys__0__KeyId: ${CONTROL_DESK_PUBLISHER_SIGNING_KEY_ID:?CONTROL_DESK_PUBLISHER_SIGNING_KEY_ID is required}
      ControlCloud__Receiver__SigningKeys__0__SecretFile: /run/secrets/safarsuite/control-desk-publisher-hmac
      ControlCloud__EntitlementSigning__ActiveKeyId: ${CONTROL_CLOUD_ENTITLEMENT_SIGNING_KEY_ID:?CONTROL_CLOUD_ENTITLEMENT_SIGNING_KEY_ID is required}
      ControlCloud__EntitlementSigning__SigningKeys__0__KeyId: ${CONTROL_CLOUD_ENTITLEMENT_SIGNING_KEY_ID:?CONTROL_CLOUD_ENTITLEMENT_SIGNING_KEY_ID is required}
      ControlCloud__EntitlementSigning__SigningKeys__0__SecretFile: /run/secrets/safarsuite/control-cloud-entitlement-hmac
      ControlCloud__AppActivationSigning__ActiveKeyId: ${CONTROL_CLOUD_APP_ACTIVATION_SIGNING_KEY_ID:?CONTROL_CLOUD_APP_ACTIVATION_SIGNING_KEY_ID is required}
      ControlCloud__AppActivationSigning__PublicKeyPemFile: /run/secrets/safarsuite/app-activation-public.pem
      ControlCloud__AppActivationSigning__PrivateKeyPemFile: /run/secrets/safarsuite/app-activation-private.pem
      ClientPortal__ProviderAccess__SharedSecretFile: /run/secrets/safarsuite/provider-access-shared-secret
      ClientPortal__ProviderAccess__SessionSigningSecretFile: /run/secrets/safarsuite/provider-access-session-hmac
      ClientPortal__ProviderAccess__TotpProtectionSecretFile: /run/secrets/safarsuite/provider-access-totp-hmac
      ClientPortal__Access__SessionSigningSecret: ${CLIENT_PORTAL_SESSION_SIGNING_SECRET:?CLIENT_PORTAL_SESSION_SIGNING_SECRET is required}
      ClientPortal__Access__MfaProtectionSecret: ${CLIENT_PORTAL_MFA_PROTECTION_SECRET:?CLIENT_PORTAL_MFA_PROTECTION_SECRET is required}
      ClientPortal__Access__PublicPortalUrl: ${CLIENT_PORTAL_PUBLIC_URL:?CLIENT_PORTAL_PUBLIC_URL is required}
      CLIENT_PORTAL_INVITATION_DELIVERY_PROVIDER: ${CLIENT_PORTAL_INVITATION_DELIVERY_PROVIDER:?CLIENT_PORTAL_INVITATION_DELIVERY_PROVIDER is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_ADDRESS: ${FROM_ADDRESS:?FROM_ADDRESS is required}
      AllowedHosts: ${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}
    volumes:
      - ./secrets:/run/secrets/safarsuite:ro
      - control-cloud-app-data:/app/App_Data
    depends_on:
      control-cloud-db:
        condition: service_healthy

  control-desk-api:
    build:
      context: ../..
      dockerfile: src/SafarSuite.ControlDesk.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Persistence__Provider: Postgres
      ConnectionStrings__ControlDesk: Host=control-desk-db;Port=5432;Database=${CONTROL_DESK_DB_NAME:?CONTROL_DESK_DB_NAME is required};Username=${CONTROL_DESK_DB_USER:?CONTROL_DESK_DB_USER is required};Password=${CONTROL_DESK_DB_PASSWORD:?CONTROL_DESK_DB_PASSWORD is required}
      ControlDesk__OperatorAccess__SessionSigningSecret: ${CONTROL_DESK_SESSION_SIGNING_SECRET:?CONTROL_DESK_SESSION_SIGNING_SECRET is required}
      ControlCloud__Publisher__Mode: Http
      ControlCloud__Publisher__Environment: Staging
      ControlCloud__Publisher__SigningKeyId: ${CONTROL_DESK_PUBLISHER_SIGNING_KEY_ID:?CONTROL_DESK_PUBLISHER_SIGNING_KEY_ID is required}
      ControlCloud__Publisher__SigningSecret: ${CONTROL_DESK_PUBLISHER_SIGNING_SECRET:?CONTROL_DESK_PUBLISHER_SIGNING_SECRET is required}
      ControlCloud__Publisher__EndpointUrl: https://${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}/api/v1/control-desk/messages
      ControlCloud__Status__BaseUrl: https://${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}
      ControlCloud__Status__ProviderAccessSecret: ${PROVIDER_ACCESS_SHARED_SECRET:?PROVIDER_ACCESS_SHARED_SECRET is required}
      ControlCloud__PortalInvitations__BaseUrl: https://${CONTROL_CLOUD_HOST:?CONTROL_CLOUD_HOST is required}
      ControlCloud__PortalInvitations__ProviderAccessSecret: ${PROVIDER_ACCESS_SHARED_SECRET:?PROVIDER_ACCESS_SHARED_SECRET is required}
      AllowedHosts: ${CONTROL_DESK_HOST:?CONTROL_DESK_HOST is required}
    depends_on:
      control-desk-db:
        condition: service_healthy
      control-cloud-api:
        condition: service_started

  control-desk-ui:
    build:
      context: ../..
      dockerfile: apps/control-desk-ui/Dockerfile
    restart: unless-stopped
    depends_on:
      - control-desk-api

  control-cloud-db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CONTROL_CLOUD_DB_HOST_PORT:?CONTROL_CLOUD_DB_HOST_PORT is required}:5432"
    environment:
      POSTGRES_DB: ${CONTROL_CLOUD_DB_NAME:?CONTROL_CLOUD_DB_NAME is required}
      POSTGRES_USER: ${CONTROL_CLOUD_DB_USER:?CONTROL_CLOUD_DB_USER is required}
      POSTGRES_PASSWORD: ${CONTROL_CLOUD_DB_PASSWORD:?CONTROL_CLOUD_DB_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CONTROL_CLOUD_DB_USER} -d ${CONTROL_CLOUD_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - control-cloud-db-data:/var/lib/postgresql/data

  control-desk-db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CONTROL_DESK_DB_HOST_PORT:?CONTROL_DESK_DB_HOST_PORT is required}:5432"
    environment:
      POSTGRES_DB: ${CONTROL_DESK_DB_NAME:?CONTROL_DESK_DB_NAME is required}
      POSTGRES_USER: ${CONTROL_DESK_DB_USER:?CONTROL_DESK_DB_USER is required}
      POSTGRES_PASSWORD: ${CONTROL_DESK_DB_PASSWORD:?CONTROL_DESK_DB_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CONTROL_DESK_DB_USER} -d ${CONTROL_DESK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - control-desk-db-data:/var/lib/postgresql/data

volumes:
  caddy-data:
  caddy-config:
  control-cloud-app-data:
  control-cloud-db-data:
  control-desk-db-data:
