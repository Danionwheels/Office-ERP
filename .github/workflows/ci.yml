name: CI Release Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-release-gate:
    name: backend-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Restore solution and tools
        run: |
          dotnet restore SafarSuite.ControlDesk.sln
          dotnet tool restore

      - name: Build solution
        run: dotnet build SafarSuite.ControlDesk.sln --configuration Release --no-restore

      - name: Run xUnit tests
        run: dotnet test SafarSuite.ControlDesk.sln --configuration Release --no-build --no-restore

      - name: Run accounting smoke
        run: dotnet run --project tools/SafarSuite.ControlDesk.AccountingSmoke --configuration Release --no-build --no-restore

      - name: Run entitlement and security smoke
        run: dotnet run --project tools/SafarSuite.LocalServer.EntitlementSmoke --configuration Release --no-build --no-restore

      - name: Validate Control Desk migrations
        env:
          SAFARSUITE_ALLOW_DEVELOPMENT_DB_FALLBACK: "true"
        run: >-
          dotnet tool run dotnet-ef migrations has-pending-model-changes
          --project src/SafarSuite.ControlDesk.Infrastructure
          --startup-project src/SafarSuite.ControlDesk.Api
          --context ControlDeskDbContext
          --configuration Release
          --no-build

      - name: Validate Control Cloud migrations
        env:
          SAFARSUITE_ALLOW_DEVELOPMENT_DB_FALLBACK: "true"
        run: >-
          dotnet tool run dotnet-ef migrations has-pending-model-changes
          --project src/SafarSuite.ControlCloud.Infrastructure/SafarSuite.ControlCloud.Infrastructure.csproj
          --startup-project src/SafarSuite.ControlCloud.Infrastructure/SafarSuite.ControlCloud.Infrastructure.csproj
          --context ControlCloudDbContext
          --configuration Release
          --no-build

  ui-release-gate:
    name: ui-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/control-desk-ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/control-desk-ui/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Build production UI
        run: npm run build

  deployment-release-gate:
    name: deployment-release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate staging Compose configuration
        run: >-
          docker compose
          --env-file deploy/staging/.env.example
          -f deploy/staging/docker-compose.yml
          config --quiet

      - name: Verify staging Compose security boundaries
        run: |
          docker compose \
            --env-file deploy/staging/.env.example \
            -f deploy/staging/docker-compose.yml \
            config --format json |
          jq -e '
            (.services.caddy.environment | keys == ["CONTROL_CLOUD_HOST", "CONTROL_DESK_HOST"]) and
            ((.services["control-cloud-api"].environment | has("CONTROL_DESK_DB_PASSWORD")) | not) and
            ((.services["control-cloud-api"].environment | has("CONTROL_DESK_SESSION_SIGNING_SECRET")) | not) and
            ((.services["control-desk-api"].environment | has("CONTROL_CLOUD_DB_PASSWORD")) | not) and
            ((.services["control-desk-api"].environment | has("CLIENT_PORTAL_SESSION_SIGNING_SECRET")) | not) and
            ((.services["control-cloud-api"].ports // []) | length == 0) and
            ((.services["control-desk-api"].ports // []) | length == 0) and
            ((.services["control-cloud-db"].ports | length) == 1) and
            (.services["control-cloud-db"].ports[0].host_ip == "127.0.0.1") and
            (.services["control-cloud-db"].ports[0].target == 5432) and
            ((.services["control-desk-db"].ports | length) == 1) and
            (.services["control-desk-db"].ports[0].host_ip == "127.0.0.1") and
            (.services["control-desk-db"].ports[0].target == 5432)
          '

  office-windows-package-gate:
    name: office-windows-package-gate
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/control-desk-ui/package-lock.json

      - name: Build self-contained office package
        shell: pwsh
        run: >-
          ./deploy/office-windows/Build-OfficePackage.ps1
          -OutputDirectory "$env:RUNNER_TEMP\safarsuite-control-desk-office"

      - name: Smoke same-origin loopback package
        shell: pwsh
        run: >-
          ./deploy/office-windows/Test-OfficePackage.ps1
          -PackageDirectory "$env:RUNNER_TEMP\safarsuite-control-desk-office"

      - name: Upload office pilot artifact
        uses: actions/upload-artifact@v4
        with:
          name: safarsuite-control-desk-office-win-x64
          path: ${{ runner.temp }}\safarsuite-control-desk-office
          if-no-files-found: error
          retention-days: 7
